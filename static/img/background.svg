<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="warmGlow" cx="18%" cy="12%" r="95%">
      <stop offset="0%" stop-color="#fcf5e6"/>
      <stop offset="52%" stop-color="#f7fbf8"/>
      <stop offset="100%" stop-color="#d6eeeb"/>
    </radialGradient>
    <pattern id="learningGrid" width="64" height="42" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V42" fill="none" stroke="#145a69" stroke-width="1" opacity="0.03"/>
    </pattern>
    <linearGradient id="leftPanelFade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.23"/>
      <stop offset="58%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softDesaturatedBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feColorMatrix type="saturate" values="0.05"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.10"/>
      </feComponentTransfer>
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#warmGlow)"/>
  <rect width="1920" height="1080" fill="url(#learningGrid)"/>
  <image href="kisomo.svg" x="960" y="180" width="1040" height="694" preserveAspectRatio="xMidYMid meet" filter="url(#softDesaturatedBlur)" opacity="1"/>
  <rect width="1160" height="1080" fill="url(#leftPanelFade)"/>
</svg>
